<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra - Ruby Rose</title>
    <link rel="stylesheet" href="css.primeira,pagina.css">
</head>
<body class="cadastro"> 

    <header style="width: 100%; position: absolute; top: 0; left: 0; padding: 20px;">
        <a href="home.html" style="text-decoration: none;">
            <div class="logo-ruby">Ruby Rose</div>
        </a>
    </header>

    <form class="container-cadastro" style="max-width: 900px; position: relative; margin-top: 80px;">
        
        <h1 style="grid-column: 1 / -1; color: #F05A7E; text-align: center; margin-bottom: 10px;">Finalizar Compra</h1>

        <div class="coluna coluna-esquerda">
            <h2 style="font-size: 1.5rem; margin-bottom: 20px;">Dados Endereço 📍</h2>
            
            <label>Cep*</label>
            <input type="text" placeholder="00000-000">
            
            <label>Bairro*</label>
            <input type="text" placeholder="Seu bairro">
            
            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>Número</label>
                    <input type="text">
                </div>
                <div style="flex: 2;">
                    <label>Complemento</label>
                    <input type="text">
                </div>
            </div>
        </div>

        <div class="coluna coluna-direita">
            <h2 style="font-size: 1.5rem; margin-bottom: 20px;">Dados para pagamento 💳</h2>
            
            <label>Número cartão*</label>
            <input type="text" placeholder="0000 0000 0000 0000">
            
            <label>Nome igual do cartão*</label>
            <input type="text" placeholder="NOME IMPRESSO">
            
            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>Validade mm/aa*</label>
                    <input type="text" placeholder="MM/AA">
                </div>
                <div style="flex: 1;">
                    <label>CVV*</label>
                    <input type="password" placeholder="123">
                </div>
            </div>
            
            <button type="button" style="width: 100%; padding: 15px; background-color: #fbdce3; color: #F05A7E; border: none; border-radius: 5px; font-weight: bold; font-size: 1.2rem; cursor: pointer; margin-top: 10px; transition: 0.3s;">
                Confirmar Pagamento
            </button>
        </div>
        
    </form>

    <div class="texto-rodape">
        <span class="linha">Linha</span> <span class="blow">Blow</span>
    </div>

</body>
</html>
