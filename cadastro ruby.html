<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Ruby Rose</title>
    <link rel="stylesheet" href="css.primeira,pagina.css">
</head>

<body class="cadastro">

    <header style="width: 100%; position: absolute; top: 0; left: 0; padding: 20px;">
        <a href="home.html" style="text-decoration: none;">
            <div class="logo-ruby">Ruby Rose</div>
        </a>
    </header>

    <form class="container-cadastro">
        
        <div class="coluna coluna-esquerda">
            <h2>Dados de login 👤</h2>
            
            <label for="email">Email*</label>
            <input type="email" id="email" name="email">
            
            <label for="senha">Senha*</label>
            <input type="password" id="senha" name="senha">
            
            <label for="confirma-senha">Confirmação de senha*</label>
            <input type="password" id="confirma-senha" name="confirma-senha">
        </div>

        <div class="coluna coluna-direita">
            <h2>Dados pessoais</h2>
            
            <label for="nome">Nome completo*</label>
            <input type="text" id="nome" name="nome">
            
            <label for="cpf">CPF*</label>
            <input type="text" id="cpf" name="cpf">
            
            <label for="nascimento">Data de nascimento*</label>
            <input type="date" id="nascimento" name="nascimento" style="width: 100%; background-color: #f05a7e; border: none; padding: 12px; margin-bottom: 25px; border-radius: 4px; color: white;">
            
            <label for="telefone">Telefone*</label>
            <input type="tel" id="telefone" name="telefone">
            
            <label for="celular">Celular*</label>
            <input type="tel" id="celular" name="celular">
        </div>
        
    </form>

    <div class="texto-rodape">
        <span class="linha">Linha</span> <span class="blow">Blow</span>
    </div>

</body>
</html>
